<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Client Sentiment Analysis</title>

  <style>
  :root{
    --red1:#a51f1f;
    --red2:#7f1515;
    --bgTop:#f3f3f3;
    --bgBottom:#cfcfcf;
    --card:#fff;
    --text:#222;
    --muted:#6b6b6b;
    --shadow:0 14px 28px rgba(0,0,0,.18);
    --inset:inset 0 2px 6px rgba(0,0,0,.10);
  }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    min-height:100vh;
    background: radial-gradient(circle at top, var(--bgTop), var(--bgBottom));
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:120px 18px 70px;
  }

  /* Top header bar */
  body::before{
    content:"SENTIMENT ANALYSIS";
    position:fixed;
    top:0; left:0; right:0;
    height:72px;
    background: linear-gradient(180deg, var(--red1), var(--red2));
    color:#fff;
    font-weight:800;
    letter-spacing:1px;
    font-size:34px;
    display:flex;
    align-items:center;
    padding-left:34px;
    box-shadow:0 6px 16px rgba(0,0,0,.22);
    z-index:999;
  }

  .container{
    width:100%;
    max-width:860px;
    display:flex;
    justify-content:center;
  }

  .card{
    width:100%;
    max-width:620px;
    background:var(--card);
    border-radius:6px;
    box-shadow:var(--shadow);
    border:1px solid rgba(0,0,0,.05);
    padding:44px 58px 56px;
    position:relative; /* for bottom-right login button */
  }

  h1{
    text-align:center;
    margin:0 0 18px 0;
    font-size:28px;
    font-weight:500;
    color:var(--text);
  }

  /* Segmented role toggle */
  .btns{
    width:240px;
    margin: 8px auto 18px;
    background:#e9e9e9;
    border-radius:999px;
    padding:4px;
    display:flex;
    gap:0;
    box-shadow: var(--inset);
  }

  .btn{
    flex:1;
    border:none;
    background:transparent;
    border-radius:999px;
    padding:7px 0;
    font-size:12px;
    font-weight:700;
    color:#4f4f4f;
    cursor:pointer;
    transition: background .2s ease, box-shadow .2s ease, color .2s ease;
  }

  .btn.active{
    background:#fff;
    color:#111;
    box-shadow:0 6px 14px rgba(0,0,0,.12);
  }

  .form-group{ margin-bottom:16px; }

  label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:#444;
    margin: 0 0 8px 2px;
  }

  input[type="text"], input[type="password"]{
    width:100%;
    box-sizing:border-box;
    padding:12px 16px;
    border-radius:999px;
    border:1px solid #e0e0e0;
    outline:none;
    font-size:12px;
    background:#fff;
    box-shadow: var(--inset);
  }

  input[type="text"]::placeholder,
  input[type="password"]::placeholder{
    color:#a7a7a7;
  }

  input[type="text"]:focus, input[type="password"]:focus{
    border-color:#cfcfcf;
    box-shadow: var(--inset), 0 0 0 4px rgba(165,31,31,.08);
  }

  /* Bottom-right Login button */
  .login-submit{
    position:absolute;
    right:26px;
    bottom:22px;
    border:none;
    background:#2a2a2a;
    color:#fff;
    font-size:12px;
    padding:7px 14px;
    border-radius:6px;
    cursor:pointer;
    box-shadow:0 10px 18px rgba(0,0,0,.18);
  }

  .login-submit:active{ transform: translateY(1px); }

  .flash{
    color:#b00020;
    margin: 0 0 12px;
    text-align:center;
    font-weight:600;
  }

  @media (max-width:480px){
    body::before{ font-size:26px; padding-left:18px; }
    .card{ padding:34px 20px 56px; }
    .btns{ width:220px; }
  }
</style>

</head>

<body>
  <div class="container">
    <div class="card">

      <h1>Login</h1>

{% with messages = get_flashed_messages() %}
  {% for message in messages %}
    {% if message != "You have been logged out." %}
      <div class="flash">{{ message }}</div>
    {% endif %}
  {% endfor %}
{% endwith %}

<form id="loginForm" action="{{ url_for('login') }}" method="post">

  <input type="hidden" id="login_role" name="login_role" value="">

  <!-- ✅ Role toggle directly under Login (like screenshot) -->
  <div class="btns" role="tablist" aria-label="Role">
    <button type="button" class="btn btn-admin active" onclick="setRole('ADMIN')">Admin</button>
    <button type="button" class="btn btn-user" onclick="setRole('USER')">User</button>
  </div>

  <div class="form-group">
    <label for="username">Username:</label>
    <input id="username" name="username" type="text" required>
  </div>

  <div class="form-group">
    <label for="password">Password:</label>
    <input id="password" name="password" type="password" required>
  </div>

  <!-- Login button stays bottom-right -->
  <button type="submit" class="login-submit">Login</button>

</form>
    </div>
  </div>

  <script>
  function setRole(role){
    document.getElementById("login_role").value = role;

    document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
    if(role === "ADMIN"){
      document.querySelector(".btn-admin").classList.add("active");
    } else {
      document.querySelector(".btn-user").classList.add("active");
    }
  }

  // default selection like screenshot
  window.addEventListener("DOMContentLoaded", () => setRole("ADMIN"));
  </script>


</body>
</html>
